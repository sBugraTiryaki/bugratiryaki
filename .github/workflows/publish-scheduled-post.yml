name: Publish scheduled blog post

# 4 Haziran 2026, 05:00 UTC = 08:00 İstanbul (Türkiye sabit UTC+3).
# GitHub cron en iyi çaba ile çalışır; birkaç dakika gecikebilir.
# Yedek: aşağıdaki "Run workflow" (workflow_dispatch) ile elle de tetiklenebilir.
on:
  schedule:
    - cron: "0 5 4 6 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish staged post (if any)
        run: |
          set -euo pipefail
          SRC="content/scheduled/yemeksepeti-589-milyon-dolar-basari-hikayesi.mdx"
          DST="content/blog/yemeksepeti-589-milyon-dolar-basari-hikayesi.mdx"

          if [ ! -f "$SRC" ]; then
            echo "Yayınlanacak zamanlanmış yazı yok ($SRC bulunamadı). Çıkılıyor."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git mv "$SRC" "$DST"
          git commit -m "feat: publish scheduled blog post — Yemeksepeti vaka analizi (4 Haziran)"
          git push origin HEAD:main
          echo "Yazı yayınlandı ve push edildi. Vercel auto-deploy tetiklenecek."
